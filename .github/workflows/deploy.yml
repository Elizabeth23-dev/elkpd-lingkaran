name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Supabase: Anon key aman di-bundle (dilindungi RLS).
          # Tambahkan kedua secret ini di GitHub repo Settings → Secrets → Actions.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # ImgBB tetap dipakai untuk upload gambar essay.
          VITE_IMGBB_API_KEY: ${{ secrets.VITE_IMGBB_API_KEY }}
        run: npm run build

      - name: Buat 404.html dengan SPA redirect
        run: |
          cat > build/client/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Redirecting...</title>
              <script>
                var l = window.location;
                l.replace(
                  l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                  '/elkpd-lingkaran/' +
                  '?p=/' + l.pathname.slice(1).replace(/\/$/,'') +
                  (l.search ? '&q=' + l.search.slice(1) : '') +
                  l.hash
                );
              </script>
            </head>
            <body>Redirecting...</body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

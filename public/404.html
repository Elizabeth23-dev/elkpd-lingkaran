<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <title>E-LKPD Lingkaran</title>
    <script>
      // GitHub Pages SPA fallback — simpan URL asli lalu redirect ke root
      sessionStorage.setItem(
        'spa_redirect',
        window.location.pathname + window.location.search
      );
      window.location.replace('/');
    </script>
  </head>
  <body>
    <p>Mengalihkan...</p>
  </body>
</html>
